<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2 id="form-title">Login</h2>
            <form id="auth-form" onsubmit="validateForm(event)">
                <label for="contact">Email or Mobile Number:</label>
                <input type="text" id="contact" name="contact" placeholder="Enter email or mobile number" required>
                
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
                
                <button type="submit" id="submit-btn">Login</button>
            </form>
            <p id="toggle-text">Don't have an account? <span onclick="toggleForm()">Sign Up</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
